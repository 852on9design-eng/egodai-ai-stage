<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>惡搞大舞台｜$380up 金主尊享 影片展示</title>
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/works-gallery.css">
</head>
<body class="works-page works-page--plan380" data-gallery-key="plan380Graphics">
  <div class="chat-bg-scroll" id="bgScroll" aria-hidden="true">
    <div class="chat-bg-inner" id="bgInner">
      <video class="chat-bg-video" id="bgVideo" autoplay loop muted defaultMuted playsinline disablePictureInPicture preload="auto"></video>
    </div>
  </div>

  <main class="works-stage">
    <header class="works-head">
      <a class="works-head__back" id="worksPageBack" href="index.html">← 返回大舞台</a>
      <h1 class="works-head__title" id="galleryPageTitle">$380up 金主尊享</h1>
      <p class="works-head__title-en" id="galleryPageTitleEn">$380 Premium · Full Package</p>
      <p class="works-head__sub" id="galleryPageIntroZh"></p>
      <p class="works-head__sub works-head__sub--en" id="galleryPageIntroEn"></p>
    </header>

    <section class="works-coverflow" id="worksCoverflow" aria-label="$380 影片展示">
      <button type="button" class="works-coverflow__nav works-coverflow__nav--prev" id="coverflowPrev" aria-label="上一張">‹</button>

      <div class="works-coverflow__viewport" id="coverflowViewport">
        <div class="works-coverflow__track" id="coverflowTrack"></div>
        <div class="works-coverflow__glow" id="coverflowGlow" aria-hidden="true"></div>
        <div class="works-coverflow__floor" aria-hidden="true"></div>
      </div>

      <button type="button" class="works-coverflow__nav works-coverflow__nav--next" id="coverflowNext" aria-label="下一張">›</button>

      <div class="works-coverflow__dots" id="coverflowDots" role="tablist" aria-label="作品索引"></div>

      <div class="works-coverflow__detail" id="coverflowDetail">
        <h2 class="works-coverflow__title" id="coverflowTitle"></h2>
        <p class="works-coverflow__title-en" id="coverflowTitleEn"></p>
        <div class="works-coverflow__video" id="coverflowVideoWrap" hidden>
          <video
            id="coverflowInlineVideo"
            class="works-coverflow__inline-video"
            playsinline
            controls
            muted
            loop
            preload="metadata"
          ></video>
        </div>
        <p class="works-coverflow__intro" id="coverflowIntro"></p>
        <p class="works-coverflow__intro-en" id="coverflowIntroEn"></p>
        <p class="works-coverflow__price" id="coverflowPrice"></p>
        <div class="works-coverflow__actions">
          <button type="button" class="works-coverflow__play" id="coverflowPlay">
            <span class="works-coverflow__play-icon" aria-hidden="true">▶</span> 全屏播放
          </button>
          <a class="work-demo-cta" id="coverflowDemo" href="#" target="_blank" rel="noopener" hidden>
            <span class="work-demo-cta__shine" aria-hidden="true"></span>
            <span class="work-demo-cta__text">Demo 免費試玩</span>
          </a>
          <a class="works-coverflow__wts" id="coverflowWts" href="#">💬 WhatsApp 查詢 $380</a>
        </div>
      </div>
    </section>
  </main>

  <div class="work-reveal work-reveal--info work-reveal--video" id="workReveal" hidden aria-hidden="true">
    <div class="work-reveal__flash" aria-hidden="true"></div>
    <div class="work-reveal__backdrop" data-close></div>
    <article class="work-reveal__panel" role="dialog" aria-modal="true" aria-labelledby="workRevealTitle">
      <button type="button" class="work-reveal__close" data-close aria-label="關閉">✕</button>
      <h2 class="work-reveal__title" id="workRevealTitle"></h2>
      <p class="work-reveal__title-en" id="workRevealTitleEn"></p>
      <div class="work-reveal__body work-reveal__body--info work-reveal__body--video">
        <div class="work-phone work-phone--landscape">
          <video class="work-phone__video work-phone__video--landscape" id="workVideo" playsinline controls muted loop preload="auto"></video>
        </div>
        <div class="work-reveal__info">
          <img class="work-reveal__poster" id="workPoster" alt="" width="1200" height="675" hidden>
          <p class="work-reveal__intro" id="workRevealIntro"></p>
          <p class="work-reveal__intro-en" id="workRevealIntroEn"></p>
          <p class="work-reveal__price" id="workPrice"></p>
          <div class="work-reveal__actions" id="workActions">
            <a class="work-reveal__wts" id="workWts" href="#" target="_blank" rel="noopener">💬 WhatsApp 查詢 $380</a>
          </div>
        </div>
      </div>
    </article>
  </div>

  <script src="js/config.js"></script>
  <script src="js/page-back-link.js"></script>
  <script src="js/bg-video.js"></script>
  <script src="js/works-gallery.js"></script>
</body>
</html>
