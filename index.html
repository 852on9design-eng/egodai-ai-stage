<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>惡搞大舞台｜AI 設計服務</title>
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/video-hotspots.css">
</head>
<body>
  <section class="chat-page" id="chatPage" aria-label="AI 引導對話">

    <!-- 第 1 層（最底）：MP4 — 視窗縮細時可上下左右捲動 -->
    <div class="chat-bg-scroll" id="bgScroll" aria-hidden="true">
      <div class="chat-bg-inner" id="bgInner">
        <video
          class="chat-bg-video"
          id="bgVideo"
          autoplay
          loop
          muted
          defaultMuted
          playsinline
          disablePictureInPicture
          preload="auto"
        ></video>
      </div>
    </div>

    <!-- 第 2 層：圖1 + 對話框 — 一組，可拖動（固定喺畫面，唔跟底圖捲） -->
    <div class="chat-widget" id="chatWidget">
      <button type="button" class="chat-widget__drag" id="dragHandle" title="按住拖動位置" aria-label="拖動對話框">
        ⠿
      </button>
      <button type="button" class="chat-widget__resize" id="resizeHandle" title="拖動右下角拉大／縮細" aria-label="調整對話框大小">
        ◢
      </button>

      <img
        class="chat-widget__frame"
        src="assets/chat-frame.png"
        width="1024"
        height="1024"
        alt="惡搞大舞台 AI 設計顧問"
        draggable="false"
      >

      <div class="chat-slot" id="chatSlot">
        <button type="button" class="chat-slot__toggle" id="chatToggle" title="收起對話" aria-label="收起對話">—</button>
        <div class="chat-panel" id="chatPanel">
          <h2 class="sr-only">AI 設計顧問</h2>
          <div class="chat-panel__body">
            <div class="chat-messages" id="chatMessages" role="log" aria-live="polite"></div>
            <div class="chat-input-row" id="chatInputRow" hidden>
              <input type="text" id="chatInput" autocomplete="organization" />
              <button type="button" id="chatSend">送出</button>
            </div>
          </div>
          <footer class="chat-panel__foot">
            <div class="chat-actions chat-actions--wts">
              <a class="wts" id="chatWts" href="#" target="_blank" rel="noopener">💬 WhatsApp</a>
            </div>
            <div class="chat-works-panel" id="chatWorksPanel">
              <button
                type="button"
                class="chat-works__toggle"
                id="chatWorksToggle"
                aria-expanded="true"
                aria-controls="chatWorks"
              >
                🖼 作品連結
                <span class="chat-works__chev" aria-hidden="true">▼</span>
              </button>
              <nav class="chat-works" id="chatWorks" aria-label="作品連結"></nav>
            </div>
            <div class="chat-actions chat-actions--nav">
              <a href="trial-ai.html">✨ 試玩</a>
              <a href="gallery.html">🖼 作品牆</a>
              <a href="info-100.html">👕 $100</a>
              <a href="info-180.html">🎨 $180</a>
              <a href="frontpage.html">🎭 價目</a>
              <a href="mobile.html">📱 手機版</a>
            </div>
          </footer>
        </div>
      </div>
    </div>

  </section>

  <script src="js/orientation-route.js"></script>
  <script src="js/config.js"></script>
  <script src="js/bg-video.js"></script>
  <script src="js/video-hotspots.js"></script>
  <script src="js/resize-widget.js"></script>
  <script src="js/drag-widget.js"></script>
  <script src="js/gemini-client.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
