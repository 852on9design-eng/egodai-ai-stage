<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>惡搞大舞台｜上畫惡搞 作品一覽</title>
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/works-gallery.css">
</head>
<body class="works-page">
  <div class="chat-bg-scroll" id="bgScroll" aria-hidden="true">
    <div class="chat-bg-inner" id="bgInner">
      <video class="chat-bg-video" id="bgVideo" autoplay loop muted defaultMuted playsinline disablePictureInPicture preload="auto"></video>
    </div>
  </div>

  <main class="works-stage">
    <header class="works-head">
      <a class="works-head__back" id="worksPageBack" href="index.html">← 返回大舞台</a>
      <h1 class="works-head__title">上畫惡搞 · 作品一覽</h1>
      <p class="works-head__sub">左右滑動揀作品 · 撳海報放大 · <strong>Demo 免費試玩</strong> · <a class="works-head__inline" href="info-180.html">$180 Info Graphic</a></p>
    </header>

    <section class="works-coverflow" id="worksCoverflow" aria-label="App 作品展示">
      <button type="button" class="works-coverflow__nav works-coverflow__nav--prev" id="coverflowPrev" aria-label="上一個作品">‹</button>

      <div class="works-coverflow__viewport" id="coverflowViewport">
        <div class="works-coverflow__track" id="coverflowTrack"></div>
        <div class="works-coverflow__glow" id="coverflowGlow" aria-hidden="true"></div>
        <div class="works-coverflow__floor" aria-hidden="true"></div>
      </div>

      <button type="button" class="works-coverflow__nav works-coverflow__nav--next" id="coverflowNext" aria-label="下一個作品">›</button>

      <div class="works-coverflow__dots" id="coverflowDots" role="tablist" aria-label="作品索引"></div>

      <div class="works-coverflow__detail" id="coverflowDetail">
        <h2 class="works-coverflow__title" id="coverflowTitle"></h2>
        <p class="works-coverflow__price" id="coverflowPrice"></p>
        <div class="works-coverflow__actions">
          <button type="button" class="works-coverflow__play" id="coverflowPlay">
            <span class="works-coverflow__play-icon" aria-hidden="true">▶</span> 睇介紹片
          </button>
          <a class="work-demo-cta" id="coverflowDemo" href="#" target="_blank" rel="noopener" hidden>
            <span class="work-demo-cta__shine" aria-hidden="true"></span>
            <span class="work-demo-cta__text">Demo 免費試玩</span>
          </a>
          <a class="works-coverflow__wts" id="coverflowWts" href="#">💬 WhatsApp</a>
        </div>
        <div class="works-refs" id="coverflowRefs" hidden>
          <p class="works-refs__heading">參考圖 · 撳一下放大</p>
          <div class="works-refs__grid" id="coverflowRefsGrid"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="work-reveal" id="workReveal" hidden aria-hidden="true">
    <div class="work-reveal__flash" aria-hidden="true"></div>
    <div class="work-reveal__backdrop" data-close></div>
    <article class="work-reveal__panel" role="dialog" aria-modal="true" aria-labelledby="workRevealTitle">
      <button type="button" class="work-reveal__close" data-close aria-label="關閉">✕</button>
      <h2 class="work-reveal__title" id="workRevealTitle"></h2>
      <div class="work-reveal__body">
        <div class="work-phone">
          <video class="work-phone__video" id="workVideo" playsinline controls muted loop preload="auto"></video>
        </div>
        <div class="work-reveal__info">
          <img class="work-reveal__poster" id="workPoster" alt="" width="640" height="360">
          <p class="work-reveal__price" id="workPrice"></p>
          <div class="work-reveal__actions" id="workActions">
            <a class="work-reveal__demo" id="workDemo" href="#" target="_blank" rel="noopener" hidden>
              ✨ 立即試玩 Demo
            </a>
            <a class="work-reveal__wts" id="workWts" href="#" target="_blank" rel="noopener">💬 WhatsApp 查詢</a>
          </div>
          <div class="works-refs works-refs--modal" id="revealRefs" hidden>
            <p class="works-refs__heading">參考圖 · 撳一下放大</p>
            <div class="works-refs__grid" id="revealRefsGrid"></div>
          </div>
        </div>
      </div>
    </article>
  </div>

  <div class="ref-lightbox" id="refLightbox" hidden aria-hidden="true">
    <div class="ref-lightbox__backdrop" data-ref-close></div>
    <figure class="ref-lightbox__panel" role="dialog" aria-modal="true" aria-labelledby="refLightboxCaption">
      <button type="button" class="ref-lightbox__close" data-ref-close aria-label="關閉">✕</button>
      <button type="button" class="ref-lightbox__nav ref-lightbox__nav--prev" id="refLightboxPrev" aria-label="上一張">‹</button>
      <img class="ref-lightbox__img" id="refLightboxImg" alt="">
      <button type="button" class="ref-lightbox__nav ref-lightbox__nav--next" id="refLightboxNext" aria-label="下一張">›</button>
      <figcaption class="ref-lightbox__caption" id="refLightboxCaption"></figcaption>
    </figure>
  </div>

  <script src="js/config.js"></script>
  <script src="js/page-back-link.js"></script>
  <script src="js/bg-video.js"></script>
  <script src="js/works-gallery.js"></script>
</body>
</html>
