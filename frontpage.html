<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>惡搞大舞台｜價目 Frontpage</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="page">
    <section class="hero-stage" id="heroStage" aria-label="惡搞大舞台首頁">
      <div class="hero-frame">
        <img
          class="hero-base"
          src="assets/hero-base.png"
          width="1920"
          height="1080"
          alt="惡搞大舞台 AI 設計服務"
        >
        <div class="sign-slot" id="signSlot" aria-hidden="true">
          <video
            class="sign-video"
            id="signVideo"
            autoplay
            loop
            muted
            defaultMuted
            playsinline
            disablePictureInPicture
            preload="auto"
          ></video>
        </div>
      </div>
    </section>
  </main>
  <script src="js/hero.js"></script>
</body>
</html>
